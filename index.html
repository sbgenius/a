<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub OAuth Demo</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
            max-width: 500px;
            width: 100%;
        }

        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 28px;
        }

        .subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .login-section {
            display: none;
        }

        .login-section.active {
            display: block;
        }

        .github-btn {
            width: 100%;
            padding: 12px 20px;
            background: #333;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .github-btn:hover {
            background: #1a1a1a;
        }

        .github-btn svg {
            width: 20px;
            height: 20px;
        }

        .loading {
            text-align: center;
            color: #666;
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .token-section {
            display: none;
        }

        .token-section.active {
            display: block;
        }

        .success-message {
            background: #d4edda;
            border: 1px solid #c3e6cb;
            color: #155724;
            padding: 15px;
            border-radius: 6px;
            margin-bottom: 20px;
            text-align: center;
        }

        .token-box {
            background: #f5f5f5;
            border: 2px solid #ddd;
            border-radius: 6px;
            padding: 15px;
            margin-bottom: 20px;
            word-break: break-all;
            font-family: "Courier New", monospace;
            font-size: 12px;
            max-height: 200px;
            overflow-y: auto;
            color: #333;
        }

        .token-label {
            font-weight: 600;
            color: #333;
            margin-bottom: 10px;
            font-size: 14px;
        }

        .user-info {
            background: #f9f9f9;
            border: 1px solid #eee;
            border-radius: 6px;
            padding: 15px;
            margin-bottom: 20px;
        }

        .user-info-item {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid #eee;
            font-size: 14px;
        }

        .user-info-item:last-child {
            border-bottom: none;
        }

        .user-info-item strong {
            color: #333;
        }

        .user-info-item span {
            color: #666;
            word-break: break-all;
        }

        .logout-btn {
            width: 100%;
            padding: 12px 20px;
            background: #6c757d;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s ease;
        }

        .logout-btn:hover {
            background: #5a6268;
        }

        .error {
            background: #f8d7da;
            border: 1px solid #f5c6cb;
            color: #721c24;
            padding: 15px;
            border-radius: 6px;
            margin-bottom: 20px;
            display: none;
        }

        .error.active {
            display: block;
        }

        .copy-btn {
            background: #667eea;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            margin-top: 10px;
        }

        .copy-btn:hover {
            background: #5568d3;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Login Section -->
        <div class="login-section active" id="loginSection">
            <h1>🔐 GitHub OAuth Demo</h1>
            <p class="subtitle">Sign in with your GitHub account</p>
            <div class="error" id="error"></div>
            <button class="github-btn" id="loginBtn" onclick="handleLogin()">
                <svg fill="currentColor" viewBox="0 0 16 16">
                    <path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.012 8.012 0 0 0 16 8c0-4.42-3.58-8-8-8z"/>
                </svg>
                Sign in with GitHub
            </button>
        </div>

        <!-- Loading Section -->
        <div class="loading" id="loadingSection">
            <div class="spinner"></div>
            <p>Authenticating...</p>
        </div>

        <!-- Token Section -->
        <div class="token-section" id="tokenSection">
            <div class="success-message">✅ Authentication Successful!</div>
            
            <div class="token-label">Access Token:</div>
            <div class="token-box" id="tokenBox">
                <div id="tokenContent"></div>
                <button class="copy-btn" onclick="copyToken()">Copy Token</button>
            </div>

            <div class="token-label">User Information:</div>
            <div class="user-info" id="userInfo"></div>

            <button class="logout-btn" onclick="logout()">Sign Out</button>
        </div>
    </div>

    <script>
        const CLIENT_ID = "Ov23libqWc7fzBMY6BOv";
        const CLIENT_SECRET = "adb138335a9a6727fdb50f43d3fa4aa94e6057bb";
        const REDIRECT_URI = "https://dry-grass-2dfb.shreyasbkg-1.workers.dev/callback";

        // Check if returning from OAuth
        function checkAuthCallback() {
            const params = new URLSearchParams(window.location.search);
            const code = params.get("code");

            if (code) {
                showLoading();
                exchangeCodeForToken(code);
            } else {
                const token = localStorage.getItem("github_token");
                if (token) {
                    displayToken(token);
                }
            }
        }

        function handleLogin() {
            const authorizeUrl = `https://github.com/login/oauth/authorize?client_id=${CLIENT_ID}&redirect_uri=${encodeURIComponent(REDIRECT_URI)}&scope=repo,delete_repo,user:email,read:user`;
            window.location.href = authorizeUrl;
        }

        async function exchangeCodeForToken(code) {
            try {
                const response = await fetch(`${WORKER_URL}?code=${encodeURIComponent(code)}`);
                const data = await response.json();

                if (data.error) {
                    showError(`Error: ${data.error} - ${data.error_description || ""}`);
                    hideLoading();
                    return;
                }

                const accessToken = data.access_token;
                localStorage.setItem("github_token", accessToken);

                // Get user info
                await getUserInfo(accessToken);
                displayToken(accessToken);
            } catch (error) {
                showError(`Error: ${error.message}`);
                hideLoading();
            }
        }

        async function getUserInfo(token) {
            try {
                const response = await fetch("https://api.github.com/user", {
                    headers: {
                        Authorization: `token ${token}`,
                        "Accept": "application/vnd.github.v3+json"
                    }
                });

                if (!response.ok) {
                    throw new Error(`Failed to fetch user info: ${response.status}`);
                }

                const user = await response.json();
                localStorage.setItem("github_user", JSON.stringify(user));
                displayUserInfo(user);
            } catch (error) {
                console.error("Error fetching user info:", error);
            }
        }

        function displayUserInfo(user) {
            const userInfoDiv = document.getElementById("userInfo");
            userInfoDiv.innerHTML = `
                <div class="user-info-item">
                    <strong>Login:</strong>
                    <span>${user.login}</span>
                </div>
                <div class="user-info-item">
                    <strong>Name:</strong>
                    <span>${user.name || "N/A"}</span>
                </div>
                <div class="user-info-item">
                    <strong>Email:</strong>
                    <span>${user.email || "N/A"}</span>
                </div>
                <div class="user-info-item">
                    <strong>Public Repos:</strong>
                    <span>${user.public_repos}</span>
                </div>
                <div class="user-info-item">
                    <strong>Followers:</strong>
                    <span>${user.followers}</span>
                </div>
            `;
        }

        function displayToken(token) {
            hideLoading();
            document.getElementById("loginSection").classList.remove("active");
            document.getElementById("tokenSection").classList.add("active");
            document.getElementById("tokenContent").textContent = token;

            const user = localStorage.getItem("github_user");
            if (user) {
                displayUserInfo(JSON.parse(user));
            }
        }

        function showLoading() {
            document.getElementById("loginSection").classList.remove("active");
            document.getElementById("loadingSection").style.display = "block";
        }

        function hideLoading() {
            document.getElementById("loadingSection").style.display = "none";
        }

        function showError(message) {
            const errorDiv = document.getElementById("error");
            errorDiv.textContent = message;
            errorDiv.classList.add("active");
        }

        function copyToken() {
            const token = localStorage.getItem("github_token");
            if (token) {
                navigator.clipboard.writeText(token).then(() => {
                    alert("Token copied to clipboard!");
                });
            }
        }

        function logout() {
            localStorage.removeItem("github_token");
            localStorage.removeItem("github_user");
            document.getElementById("tokenSection").classList.remove("active");
            document.getElementById("loginSection").classList.add("active");
            // Clean URL
            window.history.replaceState({}, document.title, window.location.pathname);
        }

        // Run on page load
        document.addEventListener("DOMContentLoaded", checkAuthCallback);
    </script>
</body>
</html>
